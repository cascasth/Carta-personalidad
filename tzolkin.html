<!DOCTYPE html>
<html lang="es">

<title>Tzolkin Dreamspell</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0b14;
    --parchment: #f5f0e8;
    --gold: #c9a84c;
    --gold-pale: #e8d5a0;
    --teal: #2a7f7f;
    --teal-light: #4ab3b3;
    --crimson: #8b1a2f;

    --glow: rgba(201, 168, 76, 0.15);

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    color: var(--parchment);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;

    position: fixed;
    inset: 0;

      radial-gradient(ellipse at 80% 80%, rgba(42, 127, 127, 0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(139, 26, 47, 0.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* Header */
  .site-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .glyph-row {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    font-size: 1.4rem;
    opacity: 0.7;
    letter-spacing: 0.15em;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1.3;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--gold-pale);
    opacity: 0.7;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2.5rem 0;
    opacity: 0.4;
  }

  /* === HOY === */
  .hoy-section {
    background: linear-gradient(135deg, rgba(61,32,96,0.35), rgba(42,127,127,0.15));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    padding: 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s ease both;
  }

  .hoy-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hoy-label {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    margin-bottom: 1.2rem;
  }

  .fecha-hoy {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: var(--gold-pale);
    opacity: 0.6;
    margin-bottom: 1.5rem;
    font-style: italic;
  }

  .kin-grande {
    position: relative;
    margin-bottom: 0.5rem;
  }

  .kin-numero {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(3rem, 12vw, 5.5rem);
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15);
    display: block;

  .kin-label-small {

    opacity: 0.5;

  .sello-nombre {

    margin: 1rem 0 0.3rem;

  .tono-nombre {

    opacity: 0.75;
    font-style: italic;
    margin-bottom: 1.2rem;
  }

  .color-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .mensaje-dia {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--parchment);
    opacity: 0.7;
    font-style: italic;
    max-width: 420px;
    margin: 0 auto;
    padding-top: 1rem;
    border-top: 1px solid rgba(201,168,76,0.15);

  /* === MINI CALC === */
  .calc-section {

  .section-title {

  input[type="date"] {

    border: 1px solid rgba(201,168,76,0.3);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;

    padding: 0.6rem 0.9rem;
    border-radius: 2px;

  }

  input[type="date"]:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  .btn-calcular {
    width: 100%;
    background: linear-gradient(135deg, var(--violet), var(--teal));
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold-pale);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;

    border-radius: 2px;

    position: relative;

  }

  .btn-calcular::before {
    content: '';

    inset: 0;
    background: rgba(201,168,76,0);

  .btn-calcular:hover {

  }

  /* Resultado */
  .resultado {
    margin-top: 1.5rem;
    padding: 1.5rem;
    background: linear-gradient(135deg, rgba(61,32,96,0.4), rgba(42,127,127,0.2));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 2px;

    display: none;

  .resultado.visible {

  .res-kin {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(201,168,76,0.5);

    margin-bottom: 0.2rem;
  }

  .res-nombre {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1rem, 3vw, 1.4rem);

    margin: 0.6rem 0 0.3rem;
  }

  .res-tono {
    font-size: 0.95rem;
    font-style: italic;
    color: var(--gold-pale);
    opacity: 0.75;
    margin-bottom: 1rem;
  }

  .res-desc {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--parchment);
    opacity: 0.65;
    font-style: italic;
    padding-top: 1rem;
    border-top: 1px solid rgba(201,168,76,0.15);
  }

  .cta-ficha {
    display: inline-block;
    margin-top: 1.2rem;
    padding: 0.55rem 1.2rem;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.3s;

  }

  .cta-ficha:hover {

    box-shadow: 0 0 20px rgba(201,168,76,0.2);

  /* Footer */
  .footer-note {
    text-align: center;
    margin-top: 3rem;
    font-size: 0.75rem;
    color: var(--parchment);
    opacity: 0.3;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 40px rgba(201,168,76,0.4), 0 0 80px rgba(201,168,76,0.15); }
    50%       { text-shadow: 0 0 60px rgba(201,168,76,0.7), 0 0 120px rgba(201,168,76,0.3); }
  }
</style>
</head>
<body>
<div class="container">

  <!-- TZOLKIN DE HOY -->
  <section class="hoy-section" id="hoy-section">

    <p class="fecha-hoy" id="fecha-hoy-texto"></p>
    <div class="kin-grande">
      <span class="kin-numero" id="hoy-kin-num">—</span>
      <span class="kin-label-small">KIN</span>
    </div>

  <div class="divider"></div>

  <!-- MINI CALCULADORA -->

      <div class="input-group">
        <label for="fecha-nac">Fecha de nacimiento</label>
        <input type="date" id="fecha-nac" min="1924-01-01" max="2025-12-31" />
      </div>
      <button class="btn-calcular" onclick="calcularKin()">Revelar mi Kin</button>

      <p class="res-tono" id="res-tono"></p>
      <p class="res-desc" id="res-desc"></p>
      <a href="https://cascasth.github.io/Mapa-identidad-natal/" class="cta-ficha">
        Obtener mi Mapa de Identidad completo →
      </a>
    </div>
  </section>

  <p class="footer-note">Sistema Dreamspell · Brújula Galáctica · Armonía del Universo</p>

</div>

<script>
// =============================================
// DATOS DREAMSPELL
// =============================================

const SELLOS = [
  { nombre: "Dragón Rojo",              color: "#c0392b", colorNombre: "Rojo",   emoji: "🔴" },
  { nombre: "Viento Blanco",            color: "#ecf0f1", colorNombre: "Blanco", emoji: "⚪" },
  { nombre: "Noche Azul",              color: "#2c5f8a", colorNombre: "Azul",   emoji: "🔵" },
  { nombre: "Semilla Amarilla",         color: "#d4ac0d", colorNombre: "Amarillo", emoji: "🟡" },
  { nombre: "Serpiente Roja",           color: "#c0392b", colorNombre: "Rojo",   emoji: "🔴" },
  { nombre: "Enlazador de Mundos Blanco", color: "#ecf0f1", colorNombre: "Blanco", emoji: "⚪" },

  { nombre: "Luna Roja",               color: "#c0392b", colorNombre: "Rojo",   emoji: "🔴" },

  { nombre: "Mono Azul",               color: "#2c5f8a", colorNombre: "Azul",   emoji: "🔵" },
  { nombre: "Humano Amarillo",          color: "#d4ac0d", colorNombre: "Amarillo", emoji: "🟡" },
  { nombre: "Caminante del Cielo Rojo", color: "#c0392b", colorNombre: "Rojo",   emoji: "🔴" },
  { nombre: "Mago Blanco",             color: "#ecf0f1", colorNombre: "Blanco", emoji: "⚪" },
  { nombre: "Águila Azul",             color: "#2c5f8a", colorNombre: "Azul",   emoji: "🔵" },
  { nombre: "Guerrero Amarillo",        color: "#d4ac0d", colorNombre: "Amarillo", emoji: "🟡" },
  { nombre: "Tierra Roja",             color: "#c0392b", colorNombre: "Rojo",   emoji: "🔴" },
  { nombre: "Espejo Blanco",           color: "#ecf0f1", colorNombre: "Blanco", emoji: "⚪" },
  { nombre: "Tormenta Azul",           color: "#2c5f8a", colorNombre: "Azul",   emoji: "🔵" },
  { nombre: "Sol Amarillo",            color: "#d4ac0d", colorNombre: "Amarillo", emoji: "🟡" },
];

const TONOS = [
  "", // índice 0 vacío
  "Tono 1 · Magnético",
  "Tono 2 · Lunar",
  "Tono 3 · Eléctrico",
  "Tono 4 · Autoexistente",
  "Tono 5 · Entonado",
  "Tono 6 · Rítmico",
  "Tono 7 · Resonante",
  "Tono 8 · Galáctico",
  "Tono 9 · Solar",
  "Tono 10 · Planetario",
  "Tono 11 · Espectral",
  "Tono 12 · Cristal",
  "Tono 13 · Cósmico",
];

const MENSAJES_SELLO = [
  "El Dragón Rojo nutre el origen. Hoy es día de protección, inicio y memoria ancestral.",
  "El Viento Blanco susurra verdades. Hoy las palabras tienen poder especial.",
  "La Noche Azul guarda los sueños. Día de abundancia interior y exploración profunda.",
  "La Semilla Amarilla despierta el potencial. Hoy florece lo que se ha sembrado.",
  "La Serpiente Roja activa la fuerza vital. Día de pasión, instinto y transformación.",
  "El Enlazador de Mundos Blanco abre puertas. Día de transición y perdón.",
  "La Mano Azul sana y cumple. Día de logros, sanación y poder de dar forma.",
  "La Estrella Amarilla irradia elegancia. Día de arte, belleza y harmonia.",
  "La Luna Roja purifica el flujo. Día de agua, memoria emocional y claridad.",
  "El Perro Blanco ama incondicionalmente. Día de lealtad, corazón abierto y compasión.",
  "El Mono Azul juega con la magia. Día de humor, ilusión y el mago interior.",
  "El Humano Amarillo elige con sabiduría. Día de libre albedrío y cosecha.",
  "El Caminante del Cielo Rojo explora lo desconocido. Día de coraje y despertar.",
  "El Mago Blanco encanta el tiempo. Día de atemporalidad, receptividad y encantamiento.",
  "El Águila Azul vuela alto y ve lejos. Día de visión, creatividad y mente colectiva.",
  "El Guerrero Amarillo cuestiona con valentía. Día de inteligencia, miedo transmutado.",
  "La Tierra Roja sincroniza la navegación. Día de evolución, sincronicidad y tierra.",
  "El Espejo Blanco refleja la verdad. Día de claridad, orden infinito y reflexión.",
  "La Tormenta Azul cataliza la transformación. Día de energía densa y autogeneración.",
  "El Sol Amarillo ilumina la conciencia. Día de fuego cósmico, ascensión y vida.",
];

const MENSAJES_TONO = [
  "",
  "Tono Magnético: unifica, atrae y propósito.",
  "Tono Lunar: polariza y estabiliza los retos.",
  "Tono Eléctrico: activa y vincula el servicio.",
  "Tono Autoexistente: define y da forma.",
  "Tono Entonado: irradia y empodera.",
  "Tono Rítmico: organiza y equilibra.",
  "Tono Resonante: sintoniza e inspira.",
  "Tono Galáctico: armoniza e integra.",
  "Tono Solar: pulsa e intenciona.",
  "Tono Planetario: manifiesta y perfecciona.",
  "Tono Espectral: disuelve y libera.",
  "Tono Cristal: dedica y universaliza.",
  "Tono Cósmico: trasciende y valora.",
];

// =============================================
// CÁLCULO DREAMSPELL
// Referencia: 26 julio 1987 = Kin 34
// =============================================

// El Dreamspell NO cuenta el 29 de febrero (Día Fuera del Tiempo).
// Hay que restarlos del conteo de días para obtener el Kin correcto.
// Referencia verificada: 26 julio 1987 = Kin 34

function isLeapYear(y) {
  return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
}

function contarDias29Feb(msA, msB) {
  const inicio = Math.min(msA, msB);
  const fin    = Math.max(msA, msB);
  const yearInicio = new Date(inicio).getUTCFullYear();
  const yearFin    = new Date(fin).getUTCFullYear();
  let count = 0;
  for (let y = yearInicio; y <= yearFin; y++) {
    if (isLeapYear(y)) {
      const feb29 = Date.UTC(y, 1, 29);
      if (feb29 > inicio && feb29 <= fin) count++;
    }
  }
  return count;
}

function getKin(dateObj) {
  const refMs    = Date.UTC(1987, 6, 26); // 26 julio 1987 = Kin 34
  const targetMs = Date.UTC(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
  const calDias  = Math.round((targetMs - refMs) / 86400000);
  const leapDias = contarDias29Feb(refMs, targetMs);
  // Si la fecha es posterior a la referencia, restamos; si es anterior, sumamos
  const diasEfectivos = calDias >= 0 ? calDias - leapDias : calDias + leapDias;
  const kin = (((34 - 1 + diasEfectivos) % 260) + 260) % 260 + 1;
  return kin;
}

function kinADatos(kin) {
  const tono = ((kin - 1) % 13) + 1;
  const selloIdx = ((kin - 1) % 20); // 0-indexed
  return { kin, tono, sello: SELLOS[selloIdx], selloIdx };
}

// =============================================
// TZOLKIN DE HOY
// =============================================

function mostrarHoy() {
  const hoy = new Date();
  const kin = getKin(hoy);
  const { tono, sello, selloIdx } = kinADatos(kin);

  // Fecha legible
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const fechaTxt = `${dias[hoy.getDay()]}, ${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;

  document.getElementById("fecha-hoy-texto").textContent = fechaTxt;
  document.getElementById("hoy-kin-num").textContent = kin;
  document.getElementById("hoy-sello").innerHTML =
    `<span class="color-dot" style="background:${sello.color}"></span>${sello.nombre}`;
  document.getElementById("hoy-tono").textContent = TONOS[tono];
  document.getElementById("hoy-mensaje").textContent =
    MENSAJES_SELLO[selloIdx] + " — " + MENSAJES_TONO[tono];
}

// =============================================
// MINI CALCULADORA
// =============================================

function calcularKin() {
  const input = document.getElementById("fecha-nac").value;
  if (!input) {
    alert("Por favor ingresa tu fecha de nacimiento.");
    return;
  }

  const partes = input.split("-");
  const fecha = new Date(parseInt(partes[0]), parseInt(partes[1]) - 1, parseInt(partes[2]));
  const { kin, tono, sello, selloIdx } = kinADatos(getKin(fecha));

  document.getElementById("res-kin-num").textContent = kin;
  document.getElementById("res-nombre").innerHTML =
    `<span class="color-dot" style="background:${sello.color}; width:10px; height:10px;"></span>${sello.nombre}`;
  document.getElementById("res-tono").textContent = TONOS[tono];
  document.getElementById("res-desc").textContent = MENSAJES_SELLO[selloIdx];

  const res = document.getElementById("resultado");
  res.classList.add("visible");
  res.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// =============================================
// INIT
// =============================================
mostrarHoy();
</script>
